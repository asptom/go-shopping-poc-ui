<div class="order-confirmation-container">
  @if (order(); as orderData) {
    <div class="confirmation-card">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd" />
        </svg>
      </div>
      
      <h1>Order Confirmed!</h1>
      <p class="subtitle">Thank you for your purchase</p>
      
      <div class="order-details">
        <div class="detail-row">
          <span class="label">Order Number:</span>
          <span class="value order-number">{{ orderData.orderNumber }}</span>
        </div>
        <div class="detail-row">
          <span class="label">Order ID:</span>
          <span class="value">{{ orderData.orderId }}</span>
        </div>
        <div class="detail-row">
          <span class="label">Total:</span>
          <span class="value total">${{ orderData.total | number:'1.2-2' }}</span>
        </div>
        <div class="detail-row">
          <span class="label">Date:</span>
          <span class="value">{{ orderData.createdAt | date:'medium' }}</span>
        </div>
      </div>
      
      <div class="actions">
        <button class="btn-primary" (click)="continueShopping()">
          Continue Shopping
        </button>
        <button class="btn-secondary" (click)="viewOrders()">
          View My Orders
        </button>
      </div>
    </div>
  } @else {
    <div class="loading-state">
      <p>Loading order details...</p>
    </div>
  }
</div>
