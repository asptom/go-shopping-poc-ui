<!-- Cart Page Template -->
<div class="cart-page">
  <div class="container">
    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">Shopping Cart</h1>
      <span class="item-count" *ngIf="!isEmpty()">
        {{ items().length }} item{{ items().length !== 1 ? 's' : '' }}
      </span>
    </div>

    <!-- Loading State -->
    <div class="loading-state" *ngIf="loading() && isEmpty()">
      <div class="skeleton-loader"></div>
    </div>

    <!-- Empty Cart State -->
    <app-empty-cart *ngIf="!loading() && isEmpty()"></app-empty-cart>

    <!-- Cart Content -->
    <div class="cart-content" *ngIf="!isEmpty()">
      <div class="cart-layout">
        <!-- Cart Items Section -->
        <div class="items-section">
          <div class="items-header">
            <span class="header-label">Product</span>
            <span class="header-label">Quantity</span>
            <span class="header-label">Price</span>
          </div>

          <div class="items-list">
            <app-cart-item
              *ngFor="let item of items()"
              [item]="item"
              [currency]="currency()"
              (updateQuantity)="onUpdateQuantity(item.line_number, $event)"
              (remove)="onRemoveItem(item.line_number)">
            </app-cart-item>
          </div>

          <div class="cart-actions">
            <button class="btn-clear" (click)="onClearCart()">
              Clear Cart
            </button>
            <a [routerLink]="['/products']" class="btn-continue">
              Continue Shopping
            </a>
          </div>
        </div>

        <!-- Order Summary Section -->
        <div class="summary-section">
          <app-cart-summary
            [subtotal]="subtotal()"
            [tax]="tax()"
            [shipping]="shipping()"
            [total]="total()"
            [currency]="currency()"
            [itemCount]="items().length"
            [canCheckout]="true"
            (checkout)="onProceedToCheckout()"
            (clearCart)="onClearCart()">
          </app-cart-summary>
        </div>
      </div>
    </div>
  </div>
</div>
