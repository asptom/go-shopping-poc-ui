<!-- Empty Cart Template -->
<div class="empty-cart">
  <div class="empty-cart-content">
    <svg class="empty-cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="m1 1 4 4h15l-1 7H6"></path>
    </svg>
    
    <h2 class="empty-cart-title">Your Shopping Cart is Empty</h2>
    
    <p class="empty-cart-message">
      Looks like you haven't added anything to your cart yet. 
      Browse our products and find something you'll love!
    </p>
    
    <a [routerLink]="['/products']" class="btn-shop">
      Start Shopping
    </a>
    
    <div class="suggestions">
      <p class="suggestions-title">Popular Categories:</p>
      <div class="category-links">
        <a [routerLink]="['/products']" [queryParams]="{category: 'Electronics'}" class="category-link">
          Electronics
        </a>
        <a [routerLink]="['/products']" [queryParams]="{category: 'Home'}" class="category-link">
          Home & Garden
        </a>
        <a [routerLink]="['/products']" [queryParams]="{category: 'Sports'}" class="category-link">
          Sports
        </a>
        <a [routerLink]="['/products']" [queryParams]="{category: 'Books'}" class="category-link">
          Books
        </a>
      </div>
    </div>
  </div>
</div>
